<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - ByZenoxxx</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:#6e45e2; margin-bottom:25px;">🛠️ ADMIN LOGIN</h2>
            <input type="text" id="admin-user" placeholder="Pseudo">
            <input type="password" id="admin-pass" placeholder="Mot de passe">
            <button class="btn-purple" onclick="tryLogin()">Se connecter</button>
        </div>
    </div>

    <div id="admin-panel" style="display:none;">
        <h1 id="welcome-msg">🛠️ Interface Gestion</h1>
        <div class="box">
            <h3>📅 PLANNING</h3>
            <div id="edit-sched" class="grid"></div>
            <button class="btn-purple" onclick="saveData('schedule')">Enregistrer</button>
        </div>
        <div class="box">
            <h3>🖥️ SETUP</h3>
            <div id="edit-setup" class="grid"></div>
            <button class="btn-purple" onclick="saveData('setup')">Enregistrer</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        async function tryLogin() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            
            // On vérifie directement dans la table secrets
            const { data, error } = await _supabase
                .from('secrets')
                .select('*')
                .eq('username', user)
                .eq('password', pass)
                .maybeSingle();

            if (data) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadAdminContent();
            } else {
                alert("❌ Identifiants faux ou erreur de connexion.");
                if(error) console.error(error);
            }
        }

        async function loadAdminContent() {
            const { data: s } = await _supabase.from('schedule').select('*').order('day_id');
            document.getElementById('edit-sched').innerHTML = s.map(d => `
                <div style="margin-bottom:10px;">
                    <label>${d.day_name}</label>
                    <input class="in-s" data-id="${d.day_id}" value="${d.stream_time}">
                </div>`).join('');

            const { data: st } = await _supabase.from('setup').select('*').order('id');
            document.getElementById('edit-setup').innerHTML = st.map(t => `
                <div style="margin-bottom:10px;">
                    <label>Item ${t.id}</label>
                    <input class="in-st" data-id="${t.id}" value="${t.item_name}">
                </div>`).join('');
        }

        async function saveData(type) {
            const isSched = type === 'schedule';
            const inputs = document.querySelectorAll(isSched ? '.in-s' : '.in-st');
            for (let i of inputs) {
                await _supabase.from(type)
                    .update(isSched ? { stream_time: i.value } : { item_name: i.value })
                    .eq(isSched ? 'day_id' : 'id', i.dataset.id);
            }
            alert("✅ Mis à jour !");
        }
    </script>
</body>
</html>
