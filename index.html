<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByZenoxxx - Hub Officiel</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <header>
            <div class="logo-area">
                <img src="logo.png" alt="Logo" style="height: 45px;">
                <span class="brand-name">BYZENOXXX</span>
            </div>
            
            <div class="menu-container">
                <button class="menu-toggle" onclick="toggleMenu(event)">☰ MENU</button>
                <nav id="main-nav">
                    <a onclick="showPage('home')">STREAM</a>
                    <a onclick="showPage('planning')">PLANNING</a>
                    <a onclick="showPage('setup')">SETUP</a>
                    <a onclick="showPage('socials')">RÉSEAUX</a>
                </nav>
            </div>
        </header>

        <div id="page-home" class="page active">
            <div class="twitch-section">
                <div id="twitch-embed">
                    <iframe src="https://player.twitch.tv/?channel=ByZenoxxx&parent=zenoxx-tech.github.io" frameborder="0" allowfullscreen="true" scrolling="no" height="100%" width="100%"></iframe>
                </div>
                <iframe id="twitch-chat" src="https://www.twitch.tv/embed/ByZenoxxx/chat?parent=zenoxx-tech.github.io" frameborder="0" scrolling="no"></iframe>
            </div>
            <button class="btn-chat-toggle" onclick="toggleChat()">MASQUER/AFFICHER LE CHAT</button>
        </div>

        <div id="page-planning" class="page">
            <h2 class="section-title">📅 PLANNING</h2>
            <div id="planning-container" class="data-grid"></div>
        </div>

        <div id="page-setup" class="page">
            <h2 class="section-title">🖥️ SETUP GAMING</h2>
            <p class="subtitle">Clique sur un élément pour voir le lien Amazon</p>
            <div id="setup-container" class="data-grid"></div>
        </div>

        <div id="page-socials" class="page">
            <h2 class="section-title">🔗 RÉSEAUX</h2>
            <div class="data-grid">
                <a href="https://www.twitch.tv/byzenoxxx" target="_blank" class="setup-item">
                    <div class="amazon-link-text">LIVE</div>
                    <div class="item-name-text">Twitch</div>
                </a>
                <a href="https://twitter.com/ByZenoxxx" target="_blank" class="setup-item">
                    <div class="amazon-link-text">ACTU</div>
                    <div class="item-name-text">Twitter / X</div>
                </a>
                <a href="https://discord.gg/Y7Tc7vvs7u" target="_blank" class="setup-item">
                    <div class="amazon-link-text">COMMU</div>
                    <div class="item-name-text">Discord</div>
                </a>
                <a href="https://www.instagram.com/byzenoxx_off/" target="_blank" class="setup-item">
                    <div class="amazon-link-text">PHOTOS</div>
                    <div class="item-name-text">Instagram</div>
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
